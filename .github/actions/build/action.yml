name: build kernel
description: each samsung kernel has its own way of building the kernel, they are sorted here.
inputs:
 branch:
  description: 'device kernel'
  required: true

runs:
 using: composite
 steps:
  - name: start kernel build
    shell: bash
    run: |
     set -e
     set -x
     cd "$CONFIG"
     
     # 【Kconfig 护盾修补】：为 LZ4KD 提供合法且可见的身份声明，附带 default y，彻底杜绝 syncconfig 抹除！
     KERNEL_SRC=""
     for d in . common kernel_platform/common Kernel kernel kernel_platform/msm-kernel; do
       if [ -d "$d/include/linux" ] && [ -d "$d/drivers" ]; then KERNEL_SRC="$d"; break; fi
     done
     [ -z "$KERNEL_SRC" ] && KERNEL_SRC="."
     
     if ! grep -q "config CRYPTO_LZ4KD" "$KERNEL_SRC/crypto/Kconfig"; then
       echo "config CRYPTO_LZ4KD" >> "$KERNEL_SRC/crypto/Kconfig"
       echo "    bool \"LZ4KD Algorithm\"" >> "$KERNEL_SRC/crypto/Kconfig"
       echo "    default y" >> "$KERNEL_SRC/crypto/Kconfig"
       echo "config CRYPTO_LZ4K_OPLUS" >> "$KERNEL_SRC/crypto/Kconfig"
       echo "    bool \"LZ4K OPLUS Algorithm\"" >> "$KERNEL_SRC/crypto/Kconfig"
       echo "    default y" >> "$KERNEL_SRC/crypto/Kconfig"
       echo "config CRYPTO_LZ4K" >> "$KERNEL_SRC/crypto/Kconfig"
       echo "    bool \"LZ4K Algorithm\"" >> "$KERNEL_SRC/crypto/Kconfig"
       echo "    default y" >> "$KERNEL_SRC/crypto/Kconfig"
     fi

     # 【核弹级无痕劫持升级版】：双层物理+环境变量劫持，彻底封死三星的逃逸路线！
     echo "🚀 部署 Kconfig 幽灵劫持器 (Dual-Layer)..."
     
     cat << 'EOF' > make_hook_core.sh
     #!/bin/bash
     # 拦截并修改所有生成的 .config
     for cfg in $(find . -name ".config" -type f 2>/dev/null); do
         # 强制内建 ZRAM 及其内存分配器 (全兼容容错替换)
         if grep -q "^# CONFIG_ZRAM is not set" "$cfg"; then
             sed -i "s/^# CONFIG_ZRAM is not set/CONFIG_ZRAM=y/g" "$cfg"
         elif grep -q "^CONFIG_ZRAM=m" "$cfg"; then
             sed -i 's/CONFIG_ZRAM=m/CONFIG_ZRAM=y/g' "$cfg"
         elif ! grep -q "^CONFIG_ZRAM=y" "$cfg"; then
             echo "CONFIG_ZRAM=y" >> "$cfg"
         fi

         if grep -q "^# CONFIG_ZSMALLOC is not set" "$cfg"; then
             sed -i "s/^# CONFIG_ZSMALLOC is not set/CONFIG_ZSMALLOC=y/g" "$cfg"
         elif grep -q "^CONFIG_ZSMALLOC=m" "$cfg"; then
             sed -i 's/CONFIG_ZSMALLOC=m/CONFIG_ZSMALLOC=y/g' "$cfg"
         elif ! grep -q "^CONFIG_ZSMALLOC=y" "$cfg"; then
             echo "CONFIG_ZSMALLOC=y" >> "$cfg"
         fi
         
         FLAGS=(
             "CONFIG_KSU_SUSFS" "CONFIG_KSU_SUSFS_SUS_PATH" "CONFIG_KSU_SUSFS_SUS_MOUNT"
             "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT" "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT"
             "CONFIG_KSU_SUSFS_SUS_KSTAT" "CONFIG_KSU_SUSFS_SUS_OVERLAYFS" "CONFIG_KSU_SUSFS_TRY_UMOUNT"
             "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT" "CONFIG_KSU_SUSFS_SPOOF_UNAME"
             "CONFIG_KSU_SUSFS_ENABLE_LOG" "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS"
             "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG" "CONFIG_KSU_SUSFS_OPEN_REDIRECT"
             "CONFIG_KSU_SUSFS_SUS_SU" "CONFIG_KSU_SUSFS_SUS_MAP"
             "CONFIG_CRYPTO_842" "CONFIG_842_COMPRESS" "CONFIG_842_DECOMPRESS"
             "CONFIG_CRYPTO_LZ4HC" "CONFIG_LZ4HC_COMPRESS" "CONFIG_LZ4HC_DECOMPRESS"
             "CONFIG_LZ4K_COMPRESS" "CONFIG_LZ4K_DECOMPRESS" "CONFIG_LZ4KD_COMPRESS" "CONFIG_LZ4KD_DECOMPRESS"
             "CONFIG_CRYPTO_LZ4K" "CONFIG_CRYPTO_LZ4KD" "CONFIG_CRYPTO_LZ4K_OPLUS" "CONFIG_ZRAM_WRITEBACK"
             "CONFIG_TCP_CONG_ADVANCED" "CONFIG_TCP_CONG_BBR" "CONFIG_NET_SCH_FQ" "CONFIG_TCP_CONG_WESTWOOD"
             "CONFIG_BPF_STREAM_PARSER" "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE" "CONFIG_NETFILTER_XT_SET"
             "CONFIG_IP_SET" "CONFIG_IP_SET_MAX=65534" "CONFIG_IP_SET_BITMAP_IP" "CONFIG_IP_SET_BITMAP_IPMAC" 
             "CONFIG_IP_SET_BITMAP_PORT" "CONFIG_IP_SET_HASH_IP" "CONFIG_IP_SET_HASH_IPMARK" "CONFIG_IP_SET_HASH_IPPORT"
             "CONFIG_IP_SET_HASH_IPPORTIP" "CONFIG_IP_SET_HASH_IPPORTNET" "CONFIG_IP_SET_HASH_IPMAC"
             "CONFIG_IP_SET_HASH_MAC" "CONFIG_IP_SET_HASH_NETPORTNET" "CONFIG_IP_SET_HASH_NET"
             "CONFIG_IP_SET_HASH_NETNET" "CONFIG_IP_SET_HASH_NETPORT" "CONFIG_IP_SET_HASH_NETIFACE"
             "CONFIG_IP_SET_LIST_SET" "CONFIG_IP6_NF_NAT" "CONFIG_IP6_NF_TARGET_MASQUERADE"
             "CONFIG_NETFILTER" "CONFIG_NETFILTER_ADVANCED" "CONFIG_NETFILTER_XTABLES"
             "CONFIG_NETFILTER_XT_TARGET_TPROXY" "CONFIG_NETFILTER_XT_MATCH_SOCKET"
             "CONFIG_NETFILTER_XT_MATCH_MARK" "CONFIG_NETFILTER_XT_TARGET_MARK"
             "CONFIG_NETFILTER_XT_TARGET_REDIRECT"
         )
         for flag in "${FLAGS[@]}"; do
             if grep -q "^# $flag is not set" "$cfg"; then
                 sed -i "s/^# $flag is not set/$flag=y/g" "$cfg"
             elif ! grep -q "^$flag=y" "$cfg"; then
                 echo "$flag=y" >> "$cfg"
             fi
         done
         sed -i "s/^CONFIG_TCP_CONG_BIC=y/# CONFIG_TCP_CONG_BIC is not set/g" "$cfg" || true
         sed -i "s/^CONFIG_TCP_CONG_HTCP=y/# CONFIG_TCP_CONG_HTCP is not set/g" "$cfg" || true
     done
     
     if [ -n "$ORIG_MAKE_BIN" ]; then
         exec "$ORIG_MAKE_BIN" "$@"
     else
         ORIG=$(which -a make | grep -v "\.hook_bin/make" | head -n 1)
         exec "$ORIG" "$@"
     fi
     EOF
     chmod +x make_hook_core.sh

     # 第一层劫持：物理替换预编译 make（最高优先级防御）
     PREBUILT_MAKE=$(find . -path "*/prebuilts/build-tools/*/bin/make" -type f | head -n 1)
     if [ -n "$PREBUILT_MAKE" ]; then
         echo "✅ 截获底层构建私有预编译 make: $PREBUILT_MAKE"
         mv "$PREBUILT_MAKE" "${PREBUILT_MAKE}.orig"
         cat << EOF_WRAPPER > "$PREBUILT_MAKE"
#!/bin/bash
export ORIG_MAKE_BIN="$(pwd)/${PREBUILT_MAKE}.orig"
"$(pwd)/make_hook_core.sh" "\$@"
EOF_WRAPPER
         chmod +x "$PREBUILT_MAKE"
     else
         echo "⚠️ 未发现 prebuilts make，依赖环境变量劫持..."
     fi

     # 第二层劫持：环境变量兜底
     mkdir -p .hook_bin
     cp make_hook_core.sh .hook_bin/make
     export PATH="$(pwd)/.hook_bin:$PATH"
     
     echo "Building the kernel..."
     if [[ ${{ inputs.branch }} == SM-S928B* || "${{ inputs.branch }}" == "SM-S938B-Oneui7" || "${{ inputs.branch }}" == "SM-S931B-Oneui8" || "${{ inputs.branch }}" == "SM-F741B-Oneui8" || "${{ inputs.branch }}" == "SM-X710-Oneui6.1.1" ]]; then
       chmod +x build_kernel_GKI.sh
       ./build_kernel_GKI.sh
     elif [[ "${{ inputs.branch }}" == "SM-X916B" || "${{ inputs.branch }}" == "SM-F946N-Oneui7" || "${{ inputs.branch }}" == "SM-S916B-Oneui8" || "${{ inputs.branch }}" == "SM-S918B-Oneui8" || "${{ inputs.branch }}" == "SM-F946B-Oneui8" || "${{ inputs.branch }}" == "SM-S901E-Oneui8" || "${{ inputs.branch }}" == "SM-X800-Oneui8" || ${{ inputs.branch }} == SM-S911B* || "${{ inputs.branch }}" == "SM-M556B-Oneui8" ]]; then
       chmod +x build_kernel_GKI.sh
       ./build_kernel_GKI.sh
     elif [[ ${{ inputs.branch }} == SM-A546* || "${{ inputs.branch }}" == "SM-M146B-Oneui7-ADYJ2" || "${{ inputs.branch }}" == "SM-S908B-Oneui8-bitK" || ${{ inputs.branch }} == SM-A055* || "${{ inputs.branch }}" == "SM-X610-Oneui6.1.1-bit7" || "${{ inputs.branch }}" == "SM-A166B-Oneui7" ]]; then
       chmod +x build_kernel.sh
       ./build_kernel.sh
     elif [[ "${{ inputs.branch }}" == "SM-A566B" ]]; then
       chmod +x build_script.sh
       touch ./kernel-6.6/abi_symbollist.raw
       touch ./kernel-6.6/abi_symbollist
       ./build_script.sh
     elif [[ ${{ inputs.branch }} == SM-S926B* ]]; then
       tools/bazel run --nocheck_bzl_visibility --config=stamp --sandbox_debug --verbose_failures --debug_make_verbosity=I //projects/s5e9945:s5e9945_user_dist
     elif [[ ${{ inputs.branch }} == SM-A556* ]]; then
       tools/bazel run --nocheck_bzl_visibility --config=stamp --sandbox_debug --verbose_failures --debug_make_verbosity=I //projects/s5e8845:s5e8845_user_dist
     elif [[ ${{ inputs.branch }} == SM-A055* || "${{ inputs.branch }}" == "SM-A075M-Oneui7" ]]; then
       chmod +x build_kernel.sh
       ./build_kernel.sh
     fi
