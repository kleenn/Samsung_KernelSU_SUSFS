name: build kernel
description: Execute build with ultimate Git Shield protection
inputs:
 branch:
  description: 'device kernel'
  required: true

runs:
 using: composite
 steps:
  - name: start kernel build
    shell: bash
    run: |
     set -e
     export IGNORE_DEFCONFIG_ERRORS=1
     cd "$CONFIG"
     
     KERNEL_SRC=""
     for d in . common kernel_platform/common Kernel kernel kernel_platform/msm-kernel; do
       if [ -d "$d/include/linux" ] && [ -d "$d/drivers" ]; then KERNEL_SRC="$d"; break; fi
     done
     [ -z "$KERNEL_SRC" ] && KERNEL_SRC="."

     # --- 专门注入 KSU、SUSFS 和 ZRAM 的核心配置（不干涉 BBR/BBG 的配置） ---
     ALL_FLAGS=(
         "CONFIG_KSU=y" "CONFIG_KSU_SUSFS=y" "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" 
         "CONFIG_KSU_SUSFS_SUS_PATH=y" "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
         "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y"
         "CONFIG_KSU_SUSFS_SUS_KSTAT=y" "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y" "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
         "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
         "CONFIG_KSU_SUSFS_ENABLE_LOG=y" "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
         "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
         "CONFIG_KSU_SUSFS_SUS_SU=y" "CONFIG_KSU_SUSFS_SUS_MAP=y"
         "CONFIG_ZRAM=y" "CONFIG_ZSMALLOC=y" "CONFIG_ZRAM_WRITEBACK=y" "CONFIG_ZRAM_DEF_COMP_LZ4KD=y"
         "CONFIG_CRYPTO_842=y" "CONFIG_842_COMPRESS=y" "CONFIG_842_DECOMPRESS=y"
         "CONFIG_CRYPTO_LZ4HC=y" "CONFIG_LZ4HC_COMPRESS=y" "CONFIG_LZ4HC_DECOMPRESS=y"
         "CONFIG_LZ4K_COMPRESS=y" "CONFIG_LZ4K_DECOMPRESS=y" "CONFIG_LZ4KD_COMPRESS=y" "CONFIG_LZ4KD_DECOMPRESS=y"
         "CONFIG_CRYPTO_LZ4K=y" "CONFIG_CRYPTO_LZ4KD=y" "CONFIG_CRYPTO_LZ4K_OPLUS=y"
     )

     TARGET_CONF_DIR="$KERNEL_SRC/arch/arm64/configs"
     if [ ! -d "$TARGET_CONF_DIR" ]; then TARGET_CONF_DIR="$KERNEL_SRC"; fi

     for defconfig in $(find "$TARGET_CONF_DIR" -type f \( -name "*defconfig" -o -name "*.config" \) 2>/dev/null); do
         for flag in "${ALL_FLAGS[@]}"; do
             key=$(echo "$flag" | cut -d'=' -f1)
             sed -i "/^$key=/d; /^# $key is not set/d" "$defconfig"
             echo "$flag" >> "$defconfig"
         done
     done

     # ====================================================================
     # 🛡️ 终极物理护盾：将前面所有 Action (SUSFS, bbr, bbg, ntsync) 的修改永久锁死！
     # 任何底层编译脚本的 git reset --hard 都将无法抹除我们的心血！
     # ====================================================================
     echo "🛡️ 开启终极 Git 护盾，保护所有模块化补丁不被重置..."
     (
       cd "$KERNEL_SRC"
       git config --global user.email "bot@actions.com"
       git config --global user.name "ActionsBot"
       git add -A
       git commit -m "Shield: Locked BBG, BBR, NTSync, SukiSU, SUSFS, and ZRAM" || echo "No changes to commit"
       echo "✅ Git 护盾部署完成！"
     )

     echo "🚀 [终极阶段] 移交控制权，开始内核原生编译..."
     if [[ ${{ inputs.branch }} == SM-S928B* || "${{ inputs.branch }}" == "SM-S938B-Oneui7" || "${{ inputs.branch }}" == "SM-S931B-Oneui8" || "${{ inputs.branch }}" == "SM-F741B-Oneui8" || "${{ inputs.branch }}" == "SM-X710-Oneui6.1.1" ]]; then
       chmod +x build_kernel_GKI.sh
       ./build_kernel_GKI.sh
     elif [[ "${{ inputs.branch }}" == "SM-X916B" || "${{ inputs.branch }}" == "SM-F946N-Oneui7" || "${{ inputs.branch }}" == "SM-S916B-Oneui8" || "${{ inputs.branch }}" == "SM-S918B-Oneui8" || "${{ inputs.branch }}" == "SM-F946B-Oneui8" || "${{ inputs.branch }}" == "SM-S901E-Oneui8" || "${{ inputs.branch }}" == "SM-X800-Oneui8" || ${{ inputs.branch }} == SM-S911B* || "${{ inputs.branch }}" == "SM-M556B-Oneui8" ]]; then
       chmod +x build_kernel_GKI.sh
       ./build_kernel_GKI.sh
     elif [[ ${{ inputs.branch }} == SM-A546* || "${{ inputs.branch }}" == "SM-M146B-Oneui7-ADYJ2" || "${{ inputs.branch }}" == "SM-S908B-Oneui8-bitK" || ${{ inputs.branch }} == SM-A055* || "${{ inputs.branch }}" == "SM-X610-Oneui6.1.1-bit7" || "${{ inputs.branch }}" == "SM-A166B-Oneui7" ]]; then
       chmod +x build_kernel.sh
       ./build_kernel.sh
     elif [[ "${{ inputs.branch }}" == "SM-A566B" ]]; then
       chmod +x build_script.sh
       touch ./kernel-6.6/abi_symbollist.raw
       touch ./kernel-6.6/abi_symbollist
       ./build_script.sh
     elif [[ ${{ inputs.branch }} == SM-S926B* ]]; then
       tools/bazel run --nocheck_bzl_visibility --config=stamp --sandbox_debug --verbose_failures --debug_make_verbosity=I //projects/s5e9945:s5e9945_user_dist
     elif [[ ${{ inputs.branch }} == SM-A556* ]]; then
       tools/bazel run --nocheck_bzl_visibility --config=stamp --sandbox_debug --verbose_failures --debug_make_verbosity=I //projects/s5e8845:s5e8845_user_dist
     elif [[ ${{ inputs.branch }} == SM-A055* || "${{ inputs.branch }}" == "SM-A075M-Oneui7" ]]; then
       chmod +x build_kernel.sh
       ./build_kernel.sh
     fi
