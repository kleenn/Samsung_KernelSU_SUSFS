name: build kernel
description: each samsung kernel has its own way of building the kernel, they are sorted here.
inputs:
 branch:
  description: 'device kernel'
  required: true

runs:
 using: composite
 steps:
  - name: start kernel build
    shell: bash
    run: |
     set -e
     set -x
     export IGNORE_DEFCONFIG_ERRORS=1
     cd "$CONFIG"
     
     KERNEL_SRC=""
     for d in . common kernel_platform/common Kernel kernel kernel_platform/msm-kernel; do
       if [ -d "$d/include/linux" ] && [ -d "$d/drivers" ]; then KERNEL_SRC="$d"; break; fi
     done
     [ -z "$KERNEL_SRC" ] && KERNEL_SRC="."

     # 废除 GKI 符号裁剪，骗过安检
     find . -name "build.config*" -type f -exec sed -i 's/TRIM_NONLISTED_KMI=1/TRIM_NONLISTED_KMI=0/g' {} + || true
     find . -name "build.config*" -type f -exec sed -i 's/KMI_SYMBOL_LIST_STRICT_MODE=1/KMI_SYMBOL_LIST_STRICT_MODE=0/g' {} + || true

     awk '/struct assoc_array keys;/{print "#include <linux/assoc_array.h>"}1' "$KERNEL_SRC/include/linux/key.h" > temp_key.h && mv temp_key.h "$KERNEL_SRC/include/linux/key.h" || true
     awk '/struct cred \{/{print "#include <linux/assoc_array.h>"}1' "$KERNEL_SRC/include/linux/cred.h" > temp_cred.h && mv temp_cred.h "$KERNEL_SRC/include/linux/cred.h" || true

     # 拷贝算法源码
     cp -r $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/lz4k/include/linux/* "$KERNEL_SRC/include/linux/" || true
     cp -r $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/lz4k/lib/* "$KERNEL_SRC/lib/" || true
     cp -r $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/lz4k/crypto/* "$KERNEL_SRC/crypto/" || true
     cp -r $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/lz4k_oplus "$KERNEL_SRC/lib/" || true

     # 信任补丁逻辑打入 lz4kd 补丁
     KVER=$(echo "$CONFIG" | awk -F'-' '{print $NF}')
     (cd "$KERNEL_SRC" && cp $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/zram_patch/${KVER}/lz4kd.patch ./ && patch -p1 -F 3 < lz4kd.patch || true)
     (cd "$KERNEL_SRC" && cp $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/zram_patch/${KVER}/lz4k_oplus.patch ./ && patch -p1 -F 3 < lz4k_oplus.patch || true)

     # 从源码层面剥夺外部模块化能力，强制转为内置
     sed -i 's/tristate "Compressed RAM block device support"/bool "Compressed RAM block device support"/g' "$KERNEL_SRC/drivers/block/zram/Kconfig" || true
     sed -i 's/tristate "Memory allocator for compressed pages"/bool "Memory allocator for compressed pages"/g' "$KERNEL_SRC/mm/Kconfig" || true

     echo "🚀 部署满血参数矩阵 (KSU + SUSFS + LZ4KD + 满血网络与代理优化)..."
     
     # 【极度严谨核对】：已将你在原 build.yml 中的所有网络、算法、管理模块完整搬运，一字不差！
     ALL_FLAGS=(
         # --- KSU & SUSFS 核心支持 ---
         "CONFIG_KSU=y"
         "CONFIG_KSU_SUSFS=y" "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" 
         "CONFIG_KSU_SUSFS_SUS_PATH=y" "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
         "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y"
         "CONFIG_KSU_SUSFS_SUS_KSTAT=y" "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y" "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
         "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
         "CONFIG_KSU_SUSFS_ENABLE_LOG=y" "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
         "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
         "CONFIG_KSU_SUSFS_SUS_SU=y" "CONFIG_KSU_SUSFS_SUS_MAP=y"
         
         # --- ZRAM 强制内建与满血压缩算法阵列 ---
         "CONFIG_ZRAM=y" "CONFIG_ZSMALLOC=y" "CONFIG_ZRAM_WRITEBACK=y" "CONFIG_ZRAM_DEF_COMP_LZ4KD=y"
         "CONFIG_CRYPTO_842=y" "CONFIG_842_COMPRESS=y" "CONFIG_842_DECOMPRESS=y"
         "CONFIG_CRYPTO_LZ4HC=y" "CONFIG_LZ4HC_COMPRESS=y" "CONFIG_LZ4HC_DECOMPRESS=y"
         "CONFIG_LZ4K_COMPRESS=y" "CONFIG_LZ4K_DECOMPRESS=y" "CONFIG_LZ4KD_COMPRESS=y" "CONFIG_LZ4KD_DECOMPRESS=y"
         "CONFIG_CRYPTO_LZ4K=y" "CONFIG_CRYPTO_LZ4KD=y" "CONFIG_CRYPTO_LZ4K_OPLUS=y"
         
         # --- 核心网络调度 (BBR + Westwood) ---
         "CONFIG_TCP_CONG_ADVANCED=y" "CONFIG_TCP_CONG_BBR=y" "CONFIG_NET_SCH_FQ=y" "CONFIG_TCP_CONG_WESTWOOD=y"
         
         # --- 满血网络功能 (路由分流、TPROXY、IP_SET、NAT 拦截全家桶) ---
         "CONFIG_BPF_STREAM_PARSER=y" "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y" "CONFIG_NETFILTER_XT_SET=y"
         "CONFIG_IP_SET=y" "CONFIG_IP_SET_MAX=65534" "CONFIG_IP_SET_BITMAP_IP=y" "CONFIG_IP_SET_BITMAP_IPMAC=y"
         "CONFIG_IP_SET_BITMAP_PORT=y" "CONFIG_IP_SET_HASH_IP=y" "CONFIG_IP_SET_HASH_IPMARK=y" "CONFIG_IP_SET_HASH_IPPORT=y"
         "CONFIG_IP_SET_HASH_IPPORTIP=y" "CONFIG_IP_SET_HASH_IPPORTNET=y" "CONFIG_IP_SET_HASH_IPMAC=y" "CONFIG_IP_SET_HASH_MAC=y"
         "CONFIG_IP_SET_HASH_NETPORTNET=y" "CONFIG_IP_SET_HASH_NET=y" "CONFIG_IP_SET_HASH_NETNET=y" "CONFIG_IP_SET_HASH_NETPORT=y"
         "CONFIG_IP_SET_HASH_NETIFACE=y" "CONFIG_IP_SET_LIST_SET=y" "CONFIG_IP6_NF_NAT=y" "CONFIG_IP6_NF_TARGET_MASQUERADE=y"
         "CONFIG_NETFILTER=y" "CONFIG_NETFILTER_ADVANCED=y" "CONFIG_NETFILTER_XTABLES=y" "CONFIG_NETFILTER_XT_TARGET_TPROXY=y"
         "CONFIG_NETFILTER_XT_MATCH_SOCKET=y" "CONFIG_NETFILTER_XT_MATCH_MARK=y" "CONFIG_NETFILTER_XT_TARGET_MARK=y" "CONFIG_NETFILTER_XT_TARGET_REDIRECT=y"
     )
     
     # 【需关闭的过时调度】
     DISABLE_FLAGS=("CONFIG_TCP_CONG_BIC" "CONFIG_TCP_CONG_HTCP")

     # 遍历所有的配置片段，进行绝对安全无残留的替换
     for defconfig in $(find . -type f \( -name "*defconfig" -o -name "*.config" \) 2>/dev/null); do
         # 注入启用项
         for flag in "${ALL_FLAGS[@]}"; do
             key=$(echo "$flag" | cut -d'=' -f1)
             sed -i "/^$key=/d" "$defconfig"
             sed -i "/^# $key is not set/d" "$defconfig"
             echo "$flag" >> "$defconfig"
         done
         
         # 注入停用项
         for d_flag in "${DISABLE_FLAGS[@]}"; do
             sed -i "/^$d_flag=/d" "$defconfig"
             echo "# $d_flag is not set" >> "$defconfig"
         done
     done
     
     echo "Building the kernel..."
     if [[ ${{ inputs.branch }} == SM-S928B* || "${{ inputs.branch }}" == "SM-S938B-Oneui7" || "${{ inputs.branch }}" == "SM-S931B-Oneui8" || "${{ inputs.branch }}" == "SM-F741B-Oneui8" || "${{ inputs.branch }}" == "SM-X710-Oneui6.1.1" ]]; then
       chmod +x build_kernel_GKI.sh
       ./build_kernel_GKI.sh
     elif [[ "${{ inputs.branch }}" == "SM-X916B" || "${{ inputs.branch }}" == "SM-F946N-Oneui7" || "${{ inputs.branch }}" == "SM-S916B-Oneui8" || "${{ inputs.branch }}" == "SM-S918B-Oneui8" || "${{ inputs.branch }}" == "SM-F946B-Oneui8" || "${{ inputs.branch }}" == "SM-S901E-Oneui8" || "${{ inputs.branch }}" == "SM-X800-Oneui8" || ${{ inputs.branch }} == SM-S911B* || "${{ inputs.branch }}" == "SM-M556B-Oneui8" ]]; then
       chmod +x build_kernel_GKI.sh
       ./build_kernel_GKI.sh
     elif [[ ${{ inputs.branch }} == SM-A546* || "${{ inputs.branch }}" == "SM-M146B-Oneui7-ADYJ2" || "${{ inputs.branch }}" == "SM-S908B-Oneui8-bitK" || ${{ inputs.branch }} == SM-A055* || "${{ inputs.branch }}" == "SM-X610-Oneui6.1.1-bit7" || "${{ inputs.branch }}" == "SM-A166B-Oneui7" ]]; then
       chmod +x build_kernel.sh
       ./build_kernel.sh
     elif [[ "${{ inputs.branch }}" == "SM-A566B" ]]; then
       chmod +x build_script.sh
       touch ./kernel-6.6/abi_symbollist.raw
       touch ./kernel-6.6/abi_symbollist
       ./build_script.sh
     elif [[ ${{ inputs.branch }} == SM-S926B* ]]; then
       tools/bazel run --nocheck_bzl_visibility --config=stamp --sandbox_debug --verbose_failures --debug_make_verbosity=I //projects/s5e9945:s5e9945_user_dist
     elif [[ ${{ inputs.branch }} == SM-A556* ]]; then
       tools/bazel run --nocheck_bzl_visibility --config=stamp --sandbox_debug --verbose_failures --debug_make_verbosity=I //projects/s5e8845:s5e8845_user_dist
     elif [[ ${{ inputs.branch }} == SM-A055* || "${{ inputs.branch }}" == "SM-A075M-Oneui7" ]]; then
       chmod +x build_kernel.sh
       ./build_kernel.sh
     fi
