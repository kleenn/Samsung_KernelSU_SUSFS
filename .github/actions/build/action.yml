name: build kernel
description: each samsung kernel has its own way of building the kernel, they are sorted here.
inputs:
 branch:
  description: 'device kernel'
  required: true

runs:
 using: composite
 steps:
  - name: start kernel build
    shell: bash
    run: |
     set -e
     set -x
     cd "$CONFIG"
     
     KERNEL_SRC=""
     for d in . common kernel_platform/common Kernel kernel kernel_platform/msm-kernel; do
       if [ -d "$d/include/linux" ] && [ -d "$d/drivers" ]; then KERNEL_SRC="$d"; break; fi
     done
     [ -z "$KERNEL_SRC" ] && KERNEL_SRC="."

     # 【ZRAM 源码复制与底层破防】
     awk '/struct assoc_array keys;/{print "#include <linux/assoc_array.h>"}1' "$KERNEL_SRC/include/linux/key.h" > temp_key.h && mv temp_key.h "$KERNEL_SRC/include/linux/key.h" || true
     awk '/struct cred \{/{print "#include <linux/assoc_array.h>"}1' "$KERNEL_SRC/include/linux/cred.h" > temp_cred.h && mv temp_cred.h "$KERNEL_SRC/include/linux/cred.h" || true

     cp -r $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/lz4k/include/linux/* "$KERNEL_SRC/include/linux/" || true
     cp -r $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/lz4k/lib/* "$KERNEL_SRC/lib/" || true
     cp -r $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/lz4k/crypto/* "$KERNEL_SRC/crypto/" || true
     cp -r $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/lz4k_oplus "$KERNEL_SRC/lib/" || true
     
     # 【致命缺失补全 1：暴力强链外层 Makefile (已验证成功，保留！)】
     grep -q "lz4k/" "$KERNEL_SRC/lib/Makefile" || echo 'obj-y += lz4k/' >> "$KERNEL_SRC/lib/Makefile"
     grep -q "lz4kd/" "$KERNEL_SRC/lib/Makefile" || echo 'obj-y += lz4kd/' >> "$KERNEL_SRC/lib/Makefile"
     grep -q "lz4k_oplus/" "$KERNEL_SRC/lib/Makefile" || echo 'obj-y += lz4k_oplus/' >> "$KERNEL_SRC/lib/Makefile"
     grep -q "lz4k.o" "$KERNEL_SRC/crypto/Makefile" || echo 'obj-y += lz4k.o' >> "$KERNEL_SRC/crypto/Makefile"
     grep -q "lz4kd.o" "$KERNEL_SRC/crypto/Makefile" || echo 'obj-y += lz4kd.o' >> "$KERNEL_SRC/crypto/Makefile"

     # 【致命缺失补全 2：暴力越权内层 Makefile】
     for mk in "$KERNEL_SRC/lib/lz4k/Makefile" "$KERNEL_SRC/lib/lz4kd/Makefile" "$KERNEL_SRC/lib/lz4k_oplus/Makefile"; do
         if [ -f "$mk" ]; then
             sed -i 's/obj-$(CONFIG_[a-zA-Z0-9_]*)/obj-y/g' "$mk" || true
         fi
     done

     # 【物理绝育：彻底斩断 TCP_BIC 与 HTCP 的编译链，粉碎 modules-only.symvers 报错！】
     for mk in $(find . -name Makefile | grep "net/ipv4"); do
         sed -i 's/obj-$(CONFIG_TCP_CONG_BIC)/#obj-disabled-bic/g' "$mk" || true
         sed -i 's/obj-$(CONFIG_TCP_CONG_HTCP)/#obj-disabled-htcp/g' "$mk" || true
     done

     # 【Kconfig 护盾修补与补丁应用】
     cp "$KERNEL_SRC/drivers/block/zram/Kconfig" "$KERNEL_SRC/drivers/block/zram/Kconfig.bak"
     cp "$KERNEL_SRC/lib/Kconfig" "$KERNEL_SRC/lib/Kconfig.bak"
     cp "$KERNEL_SRC/crypto/Kconfig" "$KERNEL_SRC/crypto/Kconfig.bak"
     
     KVER=$(echo "$CONFIG" | awk -F'-' '{print $NF}')
     (cd "$KERNEL_SRC" && cp $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/zram_patch/${KVER}/lz4kd.patch ./ && patch -p1 -F 3 < lz4kd.patch || true)
     (cd "$KERNEL_SRC" && cp $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/zram_patch/${KVER}/lz4k_oplus.patch ./ && patch -p1 -F 3 < lz4k_oplus.patch || true)

     mv "$KERNEL_SRC/drivers/block/zram/Kconfig.bak" "$KERNEL_SRC/drivers/block/zram/Kconfig"
     mv "$KERNEL_SRC/lib/Kconfig.bak" "$KERNEL_SRC/lib/Kconfig"
     mv "$KERNEL_SRC/crypto/Kconfig.bak" "$KERNEL_SRC/crypto/Kconfig"

     # 【ZRAM UI 强插：最暴力的全局文本替换，绝不依赖行匹配】
     for zc in $(find . -name zcomp.c); do
         sed -i 's/"lzo",/"lz4kd",\n\t"lz4k_oplus",\n\t"842",\n\t"lz4hc",\n\t"lz4k",\n\t"lzo",/g' "$zc" || true
     done
     
     # 【全局 Kconfig 注册：对抗所有内核目录的洗劫】
     for kcfg in $(find . -name Kconfig | grep crypto); do
         if ! grep -q "config CRYPTO_LZ4KD" "$kcfg"; then
             echo "config CRYPTO_LZ4KD" >> "$kcfg"
             echo "    bool \"LZ4KD Algorithm\"" >> "$kcfg"
             echo "    default y" >> "$kcfg"
             echo "config CRYPTO_LZ4K_OPLUS" >> "$kcfg"
             echo "    bool \"LZ4K OPLUS Algorithm\"" >> "$kcfg"
             echo "    default y" >> "$kcfg"
             echo "config CRYPTO_LZ4K" >> "$kcfg"
             echo "    bool \"LZ4K Algorithm\"" >> "$kcfg"
             echo "    default y" >> "$kcfg"
         fi
     done

     echo "🚀 部署 Kconfig 幽灵劫持器 (Dual-Layer)..."
     
     echo '#!/bin/bash' > make_hook_core.sh
     echo 'for cfg in $(find . -name ".config" -type f 2>/dev/null); do' >> make_hook_core.sh
     echo '    if grep -q "^# CONFIG_ZRAM is not set" "$cfg"; then' >> make_hook_core.sh
     echo '        sed -i "s/^# CONFIG_ZRAM is not set/CONFIG_ZRAM=y/g" "$cfg"' >> make_hook_core.sh
     echo '    elif grep -q "^CONFIG_ZRAM=m" "$cfg"; then' >> make_hook_core.sh
     echo '        sed -i "s/CONFIG_ZRAM=m/CONFIG_ZRAM=y/g" "$cfg"' >> make_hook_core.sh
     echo '    elif ! grep -q "^CONFIG_ZRAM=y" "$cfg"; then' >> make_hook_core.sh
     echo '        echo "CONFIG_ZRAM=y" >> "$cfg"' >> make_hook_core.sh
     echo '    fi' >> make_hook_core.sh
     echo '    if grep -q "^# CONFIG_ZSMALLOC is not set" "$cfg"; then' >> make_hook_core.sh
     echo '        sed -i "s/^# CONFIG_ZSMALLOC is not set/CONFIG_ZSMALLOC=y/g" "$cfg"' >> make_hook_core.sh
     echo '    elif grep -q "^CONFIG_ZSMALLOC=m" "$cfg"; then' >> make_hook_core.sh
     echo '        sed -i "s/CONFIG_ZSMALLOC=m/CONFIG_ZSMALLOC=y/g" "$cfg"' >> make_hook_core.sh
     echo '    elif ! grep -q "^CONFIG_ZSMALLOC=y" "$cfg"; then' >> make_hook_core.sh
     echo '        echo "CONFIG_ZSMALLOC=y" >> "$cfg"' >> make_hook_core.sh
     echo '    fi' >> make_hook_core.sh
     echo '    FLAGS=("CONFIG_KSU_SUSFS" "CONFIG_KSU_SUSFS_SUS_PATH" "CONFIG_KSU_SUSFS_SUS_MOUNT" "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT" "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT" "CONFIG_KSU_SUSFS_SUS_KSTAT" "CONFIG_KSU_SUSFS_SUS_OVERLAYFS" "CONFIG_KSU_SUSFS_TRY_UMOUNT" "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT" "CONFIG_KSU_SUSFS_SPOOF_UNAME" "CONFIG_KSU_SUSFS_ENABLE_LOG" "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS" "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG" "CONFIG_KSU_SUSFS_OPEN_REDIRECT" "CONFIG_KSU_SUSFS_SUS_SU" "CONFIG_KSU_SUSFS_SUS_MAP" "CONFIG_CRYPTO_842" "CONFIG_842_COMPRESS" "CONFIG_842_DECOMPRESS" "CONFIG_CRYPTO_LZ4HC" "CONFIG_LZ4HC_COMPRESS" "CONFIG_LZ4HC_DECOMPRESS" "CONFIG_LZ4K_COMPRESS" "CONFIG_LZ4K_DECOMPRESS" "CONFIG_LZ4KD_COMPRESS" "CONFIG_LZ4KD_DECOMPRESS" "CONFIG_CRYPTO_LZ4K" "CONFIG_CRYPTO_LZ4KD" "CONFIG_CRYPTO_LZ4K_OPLUS" "CONFIG_ZRAM_WRITEBACK" "CONFIG_TCP_CONG_ADVANCED" "CONFIG_TCP_CONG_BBR" "CONFIG_NET_SCH_FQ" "CONFIG_TCP_CONG_WESTWOOD" "CONFIG_BPF_STREAM_PARSER" "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE" "CONFIG_NETFILTER_XT_SET" "CONFIG_IP_SET" "CONFIG_IP_SET_MAX=65534" "CONFIG_IP_SET_BITMAP_IP" "CONFIG_IP_SET_BITMAP_IPMAC" "CONFIG_IP_SET_BITMAP_PORT" "CONFIG_IP_SET_HASH_IP" "CONFIG_IP_SET_HASH_IPMARK" "CONFIG_IP_SET_HASH_IPPORT" "CONFIG_IP_SET_HASH_IPPORTIP" "CONFIG_IP_SET_HASH_IPPORTNET" "CONFIG_IP_SET_HASH_IPMAC" "CONFIG_IP_SET_HASH_MAC" "CONFIG_IP_SET_HASH_NETPORTNET" "CONFIG_IP_SET_HASH_NET" "CONFIG_IP_SET_HASH_NETNET" "CONFIG_IP_SET_HASH_NETPORT" "CONFIG_IP_SET_HASH_NETIFACE" "CONFIG_IP_SET_LIST_SET" "CONFIG_IP6_NF_NAT" "CONFIG_IP6_NF_TARGET_MASQUERADE" "CONFIG_NETFILTER" "CONFIG_NETFILTER_ADVANCED" "CONFIG_NETFILTER_XTABLES" "CONFIG_NETFILTER_XT_TARGET_TPROXY" "CONFIG_NETFILTER_XT_MATCH_SOCKET" "CONFIG_NETFILTER_XT_MATCH_MARK" "CONFIG_NETFILTER_XT_TARGET_MARK" "CONFIG_NETFILTER_XT_TARGET_REDIRECT")' >> make_hook_core.sh
     echo '    for flag in "${FLAGS[@]}"; do' >> make_hook_core.sh
     echo '        if grep -q "^# $flag is not set" "$cfg"; then' >> make_hook_core.sh
     echo '            sed -i "s/^# $flag is not set/$flag=y/g" "$cfg"' >> make_hook_core.sh
     echo '        elif ! grep -q "^$flag=y" "$cfg"; then' >> make_hook_core.sh
     echo '            echo "$flag=y" >> "$cfg"' >> make_hook_core.sh
     echo '        fi' >> make_hook_core.sh
     echo '    done' >> make_hook_core.sh
     echo '    sed -i "s/^CONFIG_TCP_CONG_BIC=.*/# CONFIG_TCP_CONG_BIC is not set/g" "$cfg" || true' >> make_hook_core.sh
     echo '    sed -i "s/^CONFIG_TCP_CONG_HTCP=.*/# CONFIG_TCP_CONG_HTCP is not set/g" "$cfg" || true' >> make_hook_core.sh
     echo 'done' >> make_hook_core.sh
     echo 'if [ -n "$ORIG_MAKE_BIN" ]; then' >> make_hook_core.sh
     echo '    exec "$ORIG_MAKE_BIN" "$@"' >> make_hook_core.sh
     echo 'else' >> make_hook_core.sh
     echo '    ORIG=$(which -a make | grep -v "\.hook_bin/make" | head -n 1)' >> make_hook_core.sh
     echo '    exec "$ORIG" "$@"' >> make_hook_core.sh
     echo 'fi' >> make_hook_core.sh
     chmod +x make_hook_core.sh

     ABS_WORKSPACE="$(pwd)"
     for PREBUILT_MAKE in $(find . -path "*/prebuilts/build-tools/*/bin/make" -type f); do
         if [[ ! "$PREBUILT_MAKE" == *".orig"* ]]; then
             echo "✅ 截获底层私有 make: $PREBUILT_MAKE"
             mv "$PREBUILT_MAKE" "${PREBUILT_MAKE}.orig"
             echo '#!/bin/bash' > "$PREBUILT_MAKE"
             echo "export ORIG_MAKE_BIN=\"$ABS_WORKSPACE/${PREBUILT_MAKE}.orig\"" >> "$PREBUILT_MAKE"
             echo "\"$ABS_WORKSPACE/make_hook_core.sh\" \"\$@\"" >> "$PREBUILT_MAKE"
             chmod +x "$PREBUILT_MAKE"
         fi
     done

     mkdir -p .hook_bin
     cp make_hook_core.sh .hook_bin/make
     export PATH="$ABS_WORKSPACE/.hook_bin:$PATH"
     
     echo "Building the kernel..."
     if [[ ${{ inputs.branch }} == SM-S928B* || "${{ inputs.branch }}" == "SM-S938B-Oneui7" || "${{ inputs.branch }}" == "SM-S931B-Oneui8" || "${{ inputs.branch }}" == "SM-F741B-Oneui8" || "${{ inputs.branch }}" == "SM-X710-Oneui6.1.1" ]]; then
       chmod +x build_kernel_GKI.sh
       ./build_kernel_GKI.sh
     elif [[ "${{ inputs.branch }}" == "SM-X916B" || "${{ inputs.branch }}" == "SM-F946N-Oneui7" || "${{ inputs.branch }}" == "SM-S916B-Oneui8" || "${{ inputs.branch }}" == "SM-S918B-Oneui8" || "${{ inputs.branch }}" == "SM-F946B-Oneui8" || "${{ inputs.branch }}" == "SM-S901E-Oneui8" || "${{ inputs.branch }}" == "SM-X800-Oneui8" || ${{ inputs.branch }} == SM-S911B* || "${{ inputs.branch }}" == "SM-M556B-Oneui8" ]]; then
       chmod +x build_kernel_GKI.sh
       ./build_kernel_GKI.sh
     elif [[ ${{ inputs.branch }} == SM-A546* || "${{ inputs.branch }}" == "SM-M146B-Oneui7-ADYJ2" || "${{ inputs.branch }}" == "SM-S908B-Oneui8-bitK" || ${{ inputs.branch }} == SM-A055* || "${{ inputs.branch }}" == "SM-X610-Oneui6.1.1-bit7" || "${{ inputs.branch }}" == "SM-A166B-Oneui7" ]]; then
       chmod +x build_kernel.sh
       ./build_kernel.sh
     elif [[ "${{ inputs.branch }}" == "SM-A566B" ]]; then
       chmod +x build_script.sh
       touch ./kernel-6.6/abi_symbollist.raw
       touch ./kernel-6.6/abi_symbollist
       ./build_script.sh
     elif [[ ${{ inputs.branch }} == SM-S926B* ]]; then
       tools/bazel run --nocheck_bzl_visibility --config=stamp --sandbox_debug --verbose_failures --debug_make_verbosity=I //projects/s5e9945:s5e9945_user_dist
     elif [[ ${{ inputs.branch }} == SM-A556* ]]; then
       tools/bazel run --nocheck_bzl_visibility --config=stamp --sandbox_debug --verbose_failures --debug_make_verbosity=I //projects/s5e8845:s5e8845_user_dist
     elif [[ ${{ inputs.branch }} == SM-A055* || "${{ inputs.branch }}" == "SM-A075M-Oneui7" ]]; then
       chmod +x build_kernel.sh
       ./build_kernel.sh
     fi
