name: Set up SukiSU-Ultra
description: download and set up SukiSU-Ultra into the kernel source

runs:
  using: composite
  steps:
    - name: Setup SukiSU-Ultra
      shell: bash
      run: |
        cd "$COMMON"
        # 1. 先拉取 main 分支
        curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main

        # 建立软链接兼容层
        if [ -d "KernelSU" ] && [ ! -d "KernelSU-Next" ]; then ln -s KernelSU KernelSU-Next; fi

        # 2. 强行物理切换到指定的 Commit
        cd KernelSU-Next
        git checkout 77b57eff14a729c8e25979be760c4696b730e062

        # 3. 版本号欺骗
        cd kernel
        COMMITS_COUNT=$(/usr/bin/git rev-list --count HEAD)
        BASE_VERSION=30000
        KSU_VERSION=$(expr $COMMITS_COUNT "+" $BASE_VERSION)
        sed -i "s/^KSU_VERSION_FALLBACK := 1$/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" Kbuild
        KSU_GIT_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")"
        sed -i "s/^KSU_VERSION_TAG_FALLBACK := v0.0.1$/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" Kbuild

        cd "$GITHUB_WORKSPACE"
        echo "# SukiSU-Ultra Configuration" >> "$GKI_DEFCONFIG"
        echo "CONFIG_KSU=y" >> "$GKI_DEFCONFIG"

    - name: Extract KSU Version Info
      id: ksu-version
      shell: bash
      run: |
        cd "$COMMON/KernelSU-Next"
        KSU_COMMIT=$(git rev-parse --short HEAD 2>/dev/null)
        echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV
