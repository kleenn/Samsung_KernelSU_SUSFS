name: apply susfs patches
description: apply susfs patches
inputs:
  android_version: { required: true }
  kernel_version: { required: true }
  branch: { required: true }

runs:
  using: composite
  steps:
   - name: Apply SUSFS to Manager (IOCTL Routing Bypass & Version Pinning)
     shell: bash
     run: |
       # 【核心回滚】：将 SUSFS4KSU 强行锁定在最后的稳定版，彻底切断上游语法错误的污染
       cd "$GITHUB_WORKSPACE/susfs4ksu"
       git checkout e2b0f05ccca5f8fdfc33991c036672235ce48f05
       
       # 【路径复位】：退回工作区根目录，防止相对路径坐标系偏移
       cd "$GITHUB_WORKSPACE"
       cd "$COMMON/KernelSU-Next"
       PATCH_FILE="$SUSFS4KSU/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch"
       
       echo "🚀 提取 SUSFS 宏定义并注入 supercall.h..."
       grep -E "^\+#define CMD_SUSFS_" "$PATCH_FILE" | sed 's/^+//' >> kernel/include/uapi/supercall.h || true
       grep -E "^\+#define CMD_SUSFS_" "$PATCH_FILE" | sed 's/^+//' >> kernel/uapi/supercall.h || true

       echo "🚀 剔除 10 号补丁冲突区并应用补丁..."
       awk '/^diff --git a\/kernel\/supercall\//{s=1}/^diff --git/{if($0!~/supercall\//)s=0}{if(!s)print}' "$PATCH_FILE" > temp_10.patch
       mv temp_10.patch "$PATCH_FILE"
       cp "$PATCH_FILE" .
       sed -i 's/kernel\/Makefile/kernel\/Kbuild/g' 10_enable_susfs_for_ksu.patch
       patch -p1 < 10_enable_susfs_for_ksu.patch || true

       SUSFS_VERSION="v2.1.0"
       cp "$KERNEL_PATCHES/next/susfs_fix_patches/$SUSFS_VERSION/"*.patch . || true
       rm -rf multi_manager.patch multi_sepolicy_fix.patch
       for p in *.patch; do patch -p1 < "$p" || true; done

       echo "🔨 启动架构级语法强控修复..."
       sed -i '/#include "feature\/adb_root.h"/a #include "hook\/setuid_hook.h"' kernel/core/init.c || true
       sed -i '/#include "hook\/setuid_hook.h"/a #include "feature\/sucompat.h"' kernel/core/init.c || true
       sed -i '1{/^#include <linux\/susfs.h>/d}' kernel/core/init.c || true
       sed -i '/#include <linux\/moduleparam.h>/a #include <linux\/susfs.h>' kernel/core/init.c || true
       
       sed -i '/write_sulog/d; /ksu_sulog/d' kernel/feature/sucompat.c || true
       
       sed -i 's/is_zygote_normal_app_uid/is_appuid/g' kernel/hook/setuid_hook.c || true
       sed -i 's/struct task_struct \*p = current;/struct task_struct __attribute__((unused)) \*p = current;/g' kernel/policy/app_profile.c || true
       sed -i 's/struct task_struct \*t;/struct task_struct __attribute__((unused)) \*t;/g' kernel/policy/app_profile.c || true
       sed -i '1s/^/#define ksu_set_task_tracepoint_flag(x) do { (void)(x); } while (0)\n/' kernel/policy/app_profile.c || true
       
       sed -i '/#include "ksu.h"/a extern bool ksu_late_loaded;' kernel/supercall/dispatch.c || true
       
       {
         echo "#include <linux/cred.h>"
         echo "#include <linux/susfs.h>"
         echo "#include <linux/susfs_def.h>"
         echo "extern void susfs_run_sus_path_loop(void);"
         echo "extern void susfs_set_current_proc_umounted(void);"
       } >> kernel/hook/setuid_hook.h

       echo "🔗 建立绝对合法的独立通信旁路 (susfs_bypass.c)..."
       sed -i '/susfs\.o/d' kernel/Kbuild || true
       
       {
         echo "#include <linux/cred.h>"
         echo "#include <linux/susfs.h>"
         echo "#include \"uapi/supercall.h\""
         
         echo "// LTO Symbol Stubs for SukiSU"
         echo "bool ksu_late_loaded = false;"
         echo "void ksu_mark_running_process(int pid, bool mark) {}"
         echo "int ksu_get_task_mark(int pid) { return 0; }"
         echo "void ksu_set_task_mark(int pid, int mark) {}"
         echo "void ksu_mark_all_process(int mark) {}"
         echo "void ksu_unmark_all_process(int mark) {}"

         echo "// 真正的全量处理器 (拦截管理器或安装脚本的通信)"
         echo "int ksu_handle_susfs_ioctl(unsigned int cmd, void __user *arg) {"
         echo "    if (current_uid().val != 0) return -ENOTTY;"
         echo "    switch(cmd) {"
         echo "#ifdef CONFIG_KSU_SUSFS_SUS_PATH"
         echo "        case CMD_SUSFS_ADD_SUS_PATH: susfs_add_sus_path(arg); return 0;"
         echo "        case CMD_SUSFS_ADD_SUS_PATH_LOOP: susfs_add_sus_path_loop(arg); return 0;"
         echo "#endif"
         echo "#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT"
         echo "        case CMD_SUSFS_HIDE_SUS_MNTS_FOR_NON_SU_PROCS: susfs_set_hide_sus_mnts_for_non_su_procs(arg); return 0;"
         echo "#endif"
         echo "#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT"
         echo "        case CMD_SUSFS_ADD_SUS_KSTAT: susfs_add_sus_kstat(arg); return 0;"
         echo "        case CMD_SUSFS_UPDATE_SUS_KSTAT: susfs_update_sus_kstat(arg); return 0;"
         echo "        case CMD_SUSFS_ADD_SUS_KSTAT_STATICALLY: susfs_add_sus_kstat(arg); return 0;"
         echo "#endif"
         echo "#ifdef CONFIG_KSU_SUSFS_SPOOF_UNAME"
         echo "        case CMD_SUSFS_SET_UNAME: susfs_set_uname(arg); return 0;"
         echo "#endif"
         echo "#ifdef CONFIG_KSU_SUSFS_ENABLE_LOG"
         echo "        case CMD_SUSFS_ENABLE_LOG: susfs_enable_log(arg); return 0;"
         echo "#endif"
         echo "#ifdef CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG"
         echo "        case CMD_SUSFS_SET_CMDLINE_OR_BOOTCONFIG: susfs_set_cmdline_or_bootconfig(arg); return 0;"
         echo "#endif"
         echo "#ifdef CONFIG_KSU_SUSFS_OPEN_REDIRECT"
         echo "        case CMD_SUSFS_ADD_OPEN_REDIRECT: susfs_add_open_redirect(arg); return 0;"
         echo "#endif"
         echo "#ifdef CONFIG_KSU_SUSFS_SUS_MAP"
         echo "        case CMD_SUSFS_ADD_SUS_MAP: susfs_add_sus_map(arg); return 0;"
         echo "#endif"
         echo "        case CMD_SUSFS_ENABLE_AVC_LOG_SPOOFING: susfs_set_avc_log_spoofing(arg); return 0;"
         echo "        case CMD_SUSFS_SHOW_ENABLED_FEATURES: susfs_get_enabled_features(arg); return 0;"
         echo "        case CMD_SUSFS_SHOW_VARIANT: susfs_show_variant(arg); return 0;"
         echo "        case CMD_SUSFS_SHOW_VERSION: susfs_show_version(arg); return 0;"
         echo "        default: return -ENOTTY;"
         echo "    }"
         echo "}"
         
         echo "// 兜底系统 Reboot 通信模式"
         echo "int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd, void __user **arg) {"
         echo "    if (magic1 != 0x7f45253c || magic2 != 0x53555346) return -EINVAL;"
         echo "    return ksu_handle_susfs_ioctl(cmd, *arg);"
         echo "}"
       } > kernel/susfs_bypass.c
       
       grep -q "susfs_bypass.o" kernel/Kbuild || echo "obj-y += susfs_bypass.o" >> kernel/Kbuild
       
       echo "🎯 劫持 dispatch.c IOCTL 入口 (物理安全 awk 注入)..."
       awk '
       /long ksu_supercall_handle_ioctl/ { in_func=1 }
       {
           print $0
           if (in_func && $0 ~ /{/) {
               print "    extern int ksu_handle_susfs_ioctl(unsigned int cmd, void __user *arg);"
               print "    int __sus_ret = ksu_handle_susfs_ioctl(cmd, argp);"
               print "    if (__sus_ret != -ENOTTY) return __sus_ret;"
               in_func=0
           }
       }' kernel/supercall/dispatch.c > temp_dispatch.c && mv temp_dispatch.c kernel/supercall/dispatch.c

   - name: Apply SUSFS to Kernel (Knox Armor-Piercing)
     shell: bash
     run: |
      cd "$COMMON"
      cp "$SUSFS4KSU/kernel_patches/fs/"* ./fs/
      cp "$SUSFS4KSU/kernel_patches/include/linux/"* ./include/linux/

      echo "#include <linux/types.h>" > fs/ksu_dummy_hooks.c
      echo "void ksu_init_rc_hook(void) {}" >> fs/ksu_dummy_hooks.c
      echo "int ksu_execveat_hook(void) { return 0; }" >> fs/ksu_dummy_hooks.c
      echo "int ksu_input_hook(void) { return 0; }" >> fs/ksu_dummy_hooks.c
      grep -q "ksu_dummy_hooks.o" fs/Makefile || echo "obj-y += ksu_dummy_hooks.o" >> fs/Makefile

      sed -i '/#ifdef CONFIG_SECURITY_DEFEX/,/^#endif/d' fs/open.c
      sed -i '/copy_flags = CL_COPY_UNBINDABLE | CL_EXPIRE;/,/#endif/ { /#ifdef CONFIG_KDP_NS/,/#endif/ { /#else/,/#endif/!d; /#else/d; /#endif/d } }' fs/namespace.c
          
      patch -p1 < "$SUSFS4KSU/kernel_patches/50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch" || true

      echo "🎯 执行三星 Knox 精准穿甲..."
      awk '/new = copy_tree\(old, old->mnt\.mnt_root, copy_flags\);/{print "#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\n\tcopy_flags |= CL_COPY_MNT_NS;\n#endif"}1' fs/namespace.c > temp_ns.c && mv temp_ns.c fs/namespace.c

      shopt -s nullglob
      patches=("$KERNEL_PATCHES/samsung/${{ inputs.branch }}"/*.patch)
      if [ ${#patches[@]} -gt 0 ]; then
       cp "${patches[@]}" ./
       for p in *.patch; do patch -p1 < "$p" || true; done
      fi

      echo "config KSU_SUSFS" >> fs/Kconfig
      echo "    bool \"SUSFS Support\"" >> fs/Kconfig
      echo "    default y" >> fs/Kconfig
      for conf in KSU_SUSFS_SUS_PATH KSU_SUSFS_SUS_MOUNT KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT KSU_SUSFS_SUS_KSTAT KSU_SUSFS_SUS_OVERLAYFS KSU_SUSFS_TRY_UMOUNT KSU_SUSFS_SPOOF_UNAME KSU_SUSFS_ENABLE_LOG KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG KSU_SUSFS_OPEN_REDIRECT KSU_SUSFS_SUS_SU KSU_SUSFS_SUS_MAP; do
        echo "config $conf" >> fs/Kconfig
        echo "    bool" >> fs/Kconfig
        echo "    default y" >> fs/Kconfig
      done
          
      cd "$GITHUB_WORKSPACE"
      {
        echo "# SUSFS 2.1.0 Configuration"
        echo "CONFIG_KSU_SUSFS=y"
        echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
        echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
        echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y"
        echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y"
        echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
        echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y"
        echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
        echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
        echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
        echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
        echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y"
        echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
        echo "CONFIG_KSU_SUSFS_SUS_SU=y"
        echo "CONFIG_KSU_SUSFS_SUS_MAP=y"
      } >> "$GKI_DEFCONFIG"
