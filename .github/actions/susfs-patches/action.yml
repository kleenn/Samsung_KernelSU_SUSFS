name: apply susfs and zram patches (SHIELDED MODE)
description: Clean implementation with Git commit shield
inputs:
  android_version: { required: true }
  kernel_version: { required: true }
  branch: { required: true }

runs:
  using: composite
  steps:
   - name: Deploy SukiSU-Ultra & Patches
     shell: bash
     run: |
      set -e
      export IGNORE_DEFCONFIG_ERRORS=1
      cd "$CONFIG"
      
      KVER=$(echo "$CONFIG" | awk -F'-' '{print $NF}')
      AVER=$(echo "$CONFIG" | awk -F'-' '{print $(NF-1)}')
      
      KERNEL_SRC=""
      for d in . common kernel_platform/common Kernel kernel kernel_platform/msm-kernel; do
        if [ -d "$d/include/linux" ] && [ -d "$d/drivers" ]; then KERNEL_SRC="$d"; break; fi
      done
      [ -z "$KERNEL_SRC" ] && KERNEL_SRC="."

      echo "🚀 [阶段 1] 部署 SukiSU-Ultra 引擎..."
      (cd "$KERNEL_SRC" && curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | bash -s builtin)

      echo "🚀 [阶段 2] 部署 SUSFS VFS 核心层补丁..."
      git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-${AVER}-${KVER}
      SUSFS_PATCH_PATH="$PWD/susfs4ksu/kernel_patches/50_add_susfs_in_gki-${AVER}-${KVER}.patch"
      
      cp susfs4ksu/kernel_patches/fs/* "$KERNEL_SRC/fs/" || true
      cp susfs4ksu/kernel_patches/include/linux/* "$KERNEL_SRC/include/linux/" || true

      sed -i '/#ifdef CONFIG_SECURITY_DEFEX/,/^#endif/d' "$KERNEL_SRC/fs/open.c" || true
      sed -i '/copy_flags = CL_COPY_UNBINDABLE | CL_EXPIRE;/,/#endif/ { /#ifdef CONFIG_KDP_NS/,/#endif/ { /#else/,/#endif/!d; /#else/d; /#endif/d } }' "$KERNEL_SRC/fs/namespace.c" || true
      
      (cd "$KERNEL_SRC" && patch -p1 < "$SUSFS_PATCH_PATH" || true)
      awk '/new = copy_tree\(old, old->mnt\.mnt_root, copy_flags\);/{print "#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\n\tcopy_flags |= CL_COPY_MNT_NS;\n#endif"}1' "$KERNEL_SRC/fs/namespace.c" > temp_ns.c && mv temp_ns.c "$KERNEL_SRC/fs/namespace.c" || true
      grep -q "susfs.o" "$KERNEL_SRC/fs/Makefile" || echo "obj-y += susfs.o" >> "$KERNEL_SRC/fs/Makefile"

      echo "🚀 [阶段 3] 部署并严密审计 ZRAM 补丁..."
      rm -rf $GITHUB_WORKSPACE/SukiSU_patch_tmp
      git clone --depth=1 https://github.com/ShirkNeko/SukiSU_patch.git $GITHUB_WORKSPACE/SukiSU_patch_tmp

      cp -r $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/lz4k/include/linux/* "$KERNEL_SRC/include/linux/" || true
      cp -r $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/lz4k/lib/* "$KERNEL_SRC/lib/" || true
      cp -r $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/lz4k/crypto/* "$KERNEL_SRC/crypto/" || true
      cp -r $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/lz4k_oplus "$KERNEL_SRC/lib/" || true

      cp $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/zram_patch/${KVER}/lz4kd.patch "$KERNEL_SRC/" 
      cp $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/zram_patch/${KVER}/lz4k_oplus.patch "$KERNEL_SRC/" 

      (cd "$KERNEL_SRC" && awk 'BEGIN {skip=0} /^diff -u.*drivers\/block\/zram\/Kconfig/ {skip=1} /^diff -u/ && !/^diff -u.*drivers\/block\/zram\/Kconfig/ {skip=0} {if(!skip) print}' lz4kd.patch > lz4kd_clean.patch)
      (cd "$KERNEL_SRC" && awk 'BEGIN {skip=0} /^diff -u.*drivers\/block\/zram\/Kconfig/ {skip=1} /^diff -u/ && !/^diff -u.*drivers\/block\/zram\/Kconfig/ {skip=0} {if(!skip) print}' lz4k_oplus.patch > lz4k_oplus_clean.patch)

      (cd "$KERNEL_SRC" && patch -p1 -F 3 < lz4kd_clean.patch || exit 1)
      (cd "$KERNEL_SRC" && patch -p1 -F 3 < lz4k_oplus_clean.patch || exit 1)
      
      echo "" >> "$KERNEL_SRC/drivers/block/zram/Kconfig"
      echo "# --- INJECTED BY SUKISU ACTION ---" >> "$KERNEL_SRC/drivers/block/zram/Kconfig"
      echo "config ZRAM_DEF_COMP_LZ4KD" >> "$KERNEL_SRC/drivers/block/zram/Kconfig"
      echo "    bool \"lz4kd\"" >> "$KERNEL_SRC/drivers/block/zram/Kconfig"
      echo "    depends on ZRAM" >> "$KERNEL_SRC/drivers/block/zram/Kconfig"
      echo "" >> "$KERNEL_SRC/drivers/block/zram/Kconfig"
      echo "config ZRAM_DEF_COMP_LZ4K_OPLUS" >> "$KERNEL_SRC/drivers/block/zram/Kconfig"
      echo "    bool \"lz4k_oplus\"" >> "$KERNEL_SRC/drivers/block/zram/Kconfig"
      echo "    depends on ZRAM" >> "$KERNEL_SRC/drivers/block/zram/Kconfig"
      echo "" >> "$KERNEL_SRC/drivers/block/zram/Kconfig"
      echo "config ZRAM_DEF_COMP" >> "$KERNEL_SRC/drivers/block/zram/Kconfig"
      echo "    string" >> "$KERNEL_SRC/drivers/block/zram/Kconfig"
      echo "    default \"lz4kd\" if ZRAM_DEF_COMP_LZ4KD" >> "$KERNEL_SRC/drivers/block/zram/Kconfig"
      echo "    default \"lz4k_oplus\" if ZRAM_DEF_COMP_LZ4K_OPLUS" >> "$KERNEL_SRC/drivers/block/zram/Kconfig"
      echo "    default \"lzo-rle\"" >> "$KERNEL_SRC/drivers/block/zram/Kconfig"

      sed -i 's/tristate "Compressed RAM block device support"/bool "Compressed RAM block device support"/g' "$KERNEL_SRC/drivers/block/zram/Kconfig" || true
      sed -i 's/tristate "Memory allocator for compressed pages"/bool "Memory allocator for compressed pages"/g' "$KERNEL_SRC/mm/Kconfig" || true

      echo "🚀 [阶段 4] 部署满血参数矩阵..."
      find . -name "build.config*" -type f -exec sed -i 's/TRIM_NONLISTED_KMI=1/TRIM_NONLISTED_KMI=0/g' {} + || true
      find . -name "build.config*" -type f -exec sed -i 's/KMI_SYMBOL_LIST_STRICT_MODE=1/KMI_SYMBOL_LIST_STRICT_MODE=0/g' {} + || true

      ALL_FLAGS=(
          "CONFIG_KSU=y" "CONFIG_KSU_SUSFS=y" "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" 
          "CONFIG_KSU_SUSFS_SUS_PATH=y" "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
          "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y"
          "CONFIG_KSU_SUSFS_SUS_KSTAT=y" "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y" "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
          "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
          "CONFIG_KSU_SUSFS_ENABLE_LOG=y" "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
          "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
          "CONFIG_KSU_SUSFS_SUS_SU=y" "CONFIG_KSU_SUSFS_SUS_MAP=y"
          "CONFIG_ZRAM=y" "CONFIG_ZSMALLOC=y" "CONFIG_ZRAM_WRITEBACK=y" "CONFIG_ZRAM_DEF_COMP_LZ4KD=y"
          "CONFIG_CRYPTO_842=y" "CONFIG_842_COMPRESS=y" "CONFIG_842_DECOMPRESS=y"
          "CONFIG_CRYPTO_LZ4HC=y" "CONFIG_LZ4HC_COMPRESS=y" "CONFIG_LZ4HC_DECOMPRESS=y"
          "CONFIG_LZ4K_COMPRESS=y" "CONFIG_LZ4K_DECOMPRESS=y" "CONFIG_LZ4KD_COMPRESS=y" "CONFIG_LZ4KD_DECOMPRESS=y"
          "CONFIG_CRYPTO_LZ4K=y" "CONFIG_CRYPTO_LZ4KD=y" "CONFIG_CRYPTO_LZ4K_OPLUS=y"
          "CONFIG_TCP_CONG_ADVANCED=y" "CONFIG_TCP_CONG_BBR=y" "CONFIG_NET_SCH_FQ=y" "CONFIG_TCP_CONG_WESTWOOD=y"
          "CONFIG_BPF_STREAM_PARSER=y" "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y" "CONFIG_NETFILTER_XT_SET=y"
          "CONFIG_IP_SET=y" "CONFIG_IP_SET_MAX=65534" "CONFIG_IP_SET_BITMAP_IP=y" "CONFIG_IP_SET_BITMAP_IPMAC=y"
          "CONFIG_IP_SET_BITMAP_PORT=y" "CONFIG_IP_SET_HASH_IP=y" "CONFIG_IP_SET_HASH_IPMARK=y" "CONFIG_IP_SET_HASH_IPPORT=y"
          "CONFIG_IP_SET_HASH_IPPORTIP=y" "CONFIG_IP_SET_HASH_IPPORTNET=y" "CONFIG_IP_SET_HASH_IPMAC=y" "CONFIG_IP_SET_HASH_MAC=y"
          "CONFIG_IP_SET_HASH_NETPORTNET=y" "CONFIG_IP_SET_HASH_NET=y" "CONFIG_IP_SET_HASH_NETNET=y" "CONFIG_IP_SET_HASH_NETPORT=y"
          "CONFIG_IP_SET_HASH_NETIFACE=y" "CONFIG_IP_SET_LIST_SET=y" "CONFIG_IP6_NF_NAT=y" "CONFIG_IP6_NF_TARGET_MASQUERADE=y"
          "CONFIG_NETFILTER=y" "CONFIG_NETFILTER_ADVANCED=y" "CONFIG_NETFILTER_XTABLES=y" "CONFIG_NETFILTER_XT_TARGET_TPROXY=y"
          "CONFIG_NETFILTER_XT_MATCH_SOCKET=y" "CONFIG_NETFILTER_XT_MATCH_MARK=y" "CONFIG_NETFILTER_XT_TARGET_MARK=y" "CONFIG_NETFILTER_XT_TARGET_REDIRECT=y"
      )
      DISABLE_FLAGS=("CONFIG_TCP_CONG_BIC" "CONFIG_TCP_CONG_HTCP")

      TARGET_CONF_DIR="$KERNEL_SRC/arch/arm64/configs"
      if [ ! -d "$TARGET_CONF_DIR" ]; then TARGET_CONF_DIR="$KERNEL_SRC"; fi

      for defconfig in $(find "$TARGET_CONF_DIR" -type f \( -name "*defconfig" -o -name "*.config" \) 2>/dev/null); do
          for flag in "${ALL_FLAGS[@]}"; do
              key=$(echo "$flag" | cut -d'=' -f1)
              sed -i "/^$key=/d; /^# $key is not set/d" "$defconfig"
              echo "$flag" >> "$defconfig"
          done
          for d_flag in "${DISABLE_FLAGS[@]}"; do
              sed -i "/^$d_flag=/d" "$defconfig"
              echo "# $d_flag is not set" >> "$defconfig"
          done
      done

      echo "🛡️ [阶段 5] 开启 Git 护盾，防止三星脚本清理..."
      cd "$KERNEL_SRC"
      git config --global user.email "bot@example.com"
      git config --global user.name "bot"
      git add -A
      git commit -m "Inject SukiSU, SUSFS, ZRAM and all configs" || echo "No changes to commit"
      
   - name: Immediate Self-Verification
     shell: bash
     run: |
       cd "$CONFIG"
       KERNEL_SRC=""
       for d in . common kernel_platform/common Kernel kernel kernel_platform/msm-kernel; do
         if [ -d "$d/include/linux" ] && [ -d "$d/drivers" ]; then KERNEL_SRC="$d"; break; fi
       done
       [ -z "$KERNEL_SRC" ] && KERNEL_SRC="."
       
       echo "======================================================="
       echo "   前置自检：确认 Git 护盾已保护所有修改文件！"
       echo "======================================================="
       echo "[1] zcomp.c 阵列:"
       head -n 35 "$KERNEL_SRC/drivers/block/zram/zcomp.c" | grep -A 5 "backends" || true
       echo -e "\n[2] SukiSU-Ultra 引擎目录是否存在:"
       ls -la "$KERNEL_SRC/KernelSU" | head -n 5 || true
       echo -e "\n[3] 检查提交历史记录:"
       (cd "$KERNEL_SRC" && git log -n 1 --oneline) || true
       echo "======================================================="
