name: Kernel Build Process
permissions:
  contents: write
  actions: write 

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      android_version:
        required: true
        type: string
      kernel_version:
        required: true
        type: string
      susfs:
        required: true
        type: string
      bbg:
        required: true
        type: string
      unicodefix:
        required: true
        type: string
      zeromount:
        required: true
        type: string
      ksun:
        required: true
        type: string
      droidspace:
        required: true
        type: string
      ntsync:
        required: true
        type: string
      bbr:
        required: true
        type: string

jobs:
  build-samsung-gki:
    if: inputs.branch == 'SM-S901E-Oneui8' || inputs.branch == 'SM-S9080-Oneui8'
    name: "${{ inputs.branch }}-${{ inputs.kernel_version }}-${{ inputs.android_version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
       
      - name: Free Disk Space
        if: true
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      - name: Setup more Swap (for LTO)
        uses: thejerrybao/setup-swap-space@v1
        with:
          swap-size-gb: 25
        
      - name: Set CONFIG Environment Variable
        run: |
          CONFIG="${{ inputs.branch }}-${{ inputs.android_version }}-${{ inputs.kernel_version }}"
          echo "CONFIG=$CONFIG" >> $GITHUB_ENV

      - name: dependencies
        uses: ./.github/actions/dependencies
        with:
          zeromount: ${{ inputs.zeromount }}
          susfs: ${{ inputs.susfs }}
          android_version: ${{ inputs.android_version }}
          kernel_version: ${{ inputs.kernel_version }}
          
      - name: Download Kernel
        uses: ./.github/actions/clone-kernel
        with:
          branch: ${{ inputs.branch }}
            
      - name: Set Path Environment Variables
        uses: ./.github/actions/env-variables
        with:
         branch: ${{ inputs.branch }}
         susfs: ${{ inputs.susfs }}
         zeromount: ${{ inputs.zeromount }}
          
      - name: Extract all tar.xz files and delete them
        run: |
          cd "$CONFIG"
          find . -type f -name '*.tar.xz' -print0 | while IFS= read -r -d '' file; do
            echo "Extracting $file"
            tar -xf "$file"
            rm "$file"
          done

      - name: Add KernelSU-Next
        if: inputs.ksun == 'true'
        uses: ./.github/actions/ksun
        
      - name: Apply SUSFS Patches
        if: inputs.susfs == 'true'
        uses: ./.github/actions/susfs-patches
        with:
          android_version: ${{ inputs.android_version }}
          kernel_version: ${{ inputs.kernel_version }}
          branch: ${{ inputs.branch }}

      - name: Apply zeromount Patches
        if: inputs.susfs == 'true' && inputs.zeromount == 'true'
        uses: ./.github/actions/zeromount
        with:
          android_version: ${{ inputs.android_version }}
          kernel_version: ${{ inputs.kernel_version }}

      - name: Fix WiFi and Bluetooth on Samsung 6.6 GKI devices
        if: inputs.kernel_version == '6.6'
        uses: ./.github/actions/6.6-fix
        with:
         branch: ${{ inputs.branch }}

      - name: Add bbrv1
        if: inputs.bbr == 'true'
        uses: ./.github/actions/bbr

      - name: Add BBG
        if: inputs.bbg == 'true'
        uses: ./.github/actions/bbg

      - name: temp fix for m55 bootloop maybe
        if: inputs.branch == 'SM-M556B-Oneui8'
        uses: ./.github/actions/m55-fix

      - name: Add unicodefix
        if: inputs.unicodefix == 'true'
        uses: ./.github/actions/unicode
        with:
          kernel_version: ${{ inputs.kernel_version }}

      - name: Add droidspace support
        if: inputs.droidspace == 'true'
        uses: ./.github/actions/droidspaces
        with:
          kernel_version: ${{ inputs.kernel_version }}

      - name: Add ntsync
        if: inputs.ntsync == 'true'
        uses: ./.github/actions/ntsync
        with:
          android_version: ${{ inputs.android_version }}
          kernel_version: ${{ inputs.kernel_version }}
          
      - name: Set Kernel Configuration Variables
        if: inputs.ksun == 'true'
        uses: ./.github/actions/configs
        with:
         branch: ${{ inputs.branch }}

            # ================== 核心功能注入区 ==================
      - name: Inject Network & LZ4KD Optimizations
        run: |
          cd "$CONFIG"
          git clone https://github.com/ShirkNeko/SukiSU_patch.git $GITHUB_WORKSPACE/SukiSU_patch_tmp
          KERNEL_SRC=""
          for d in . common kernel_platform/common Kernel kernel kernel_platform/msm-kernel; do
            if [ -d "$d/include/linux" ] && [ -d "$d/drivers" ]; then KERNEL_SRC="$d"; break; fi
          done
          [ -z "$KERNEL_SRC" ] && KERNEL_SRC="."
          cd "$KERNEL_SRC"
          
          awk '/struct assoc_array keys;/{print "#include <linux/assoc_array.h>"}1' include/linux/key.h > temp_key.h && mv temp_key.h include/linux/key.h
          awk '/struct cred \{/{print "#include <linux/assoc_array.h>"}1' include/linux/cred.h > temp_cred.h && mv temp_cred.h include/linux/cred.h

          cp -r $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/lz4k/include/linux/* include/linux/
          cp -r $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/lz4k/lib/* lib/
          cp -r $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/lz4k/crypto/* crypto/
          cp -r $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/lz4k_oplus lib/
          
          # 【Kconfig 免疫护盾】
          cp drivers/block/zram/Kconfig drivers/block/zram/Kconfig.bak
          cp lib/Kconfig lib/Kconfig.bak
          cp crypto/Kconfig crypto/Kconfig.bak
          
          cp $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/zram_patch/${{ inputs.kernel_version }}/lz4kd.patch ./
          patch -p1 -F 3 < lz4kd.patch || true
          cp $GITHUB_WORKSPACE/SukiSU_patch_tmp/other/zram/zram_patch/${{ inputs.kernel_version }}/lz4k_oplus.patch ./
          patch -p1 -F 3 < lz4k_oplus.patch || true

          mv drivers/block/zram/Kconfig.bak drivers/block/zram/Kconfig
          mv lib/Kconfig.bak lib/Kconfig
          mv crypto/Kconfig.bak crypto/Kconfig

          # 【强插 UI 选项】：把你见过的所有神级算法，全部强插到 UI 列表供软件读取！
          awk '/static const char \* const backends\[\] = \{/{print; print "\t\"lz4kd\",\n\t\"lz4k_oplus\",\n\t\"842\",\n\t\"lz4hc\",\n\t\"lz4k\","; next}1' drivers/block/zram/zcomp.c > temp_zcomp.c && mv temp_zcomp.c drivers/block/zram/zcomp.c

          DEFCONFIG="arch/arm64/configs/gki_defconfig"
          if [ ! -f "$DEFCONFIG" ]; then DEFCONFIG=$(find arch/arm64/configs -name "*defconfig" | grep -i "gki" | head -n 1); fi
          
          # 【核弹级内置】：合规替换，从根源配置树上将 ZRAM 及内存分配器焊死为主镜像驱动！
          sed -i 's/CONFIG_ZRAM=m/CONFIG_ZRAM=y/g' "$DEFCONFIG"
          sed -i 's/CONFIG_ZSMALLOC=m/CONFIG_ZSMALLOC=y/g' "$DEFCONFIG"
          
          {
            # ===== 满血算法矩阵 (全量开启并强制内建) =====
            echo "CONFIG_CRYPTO_842=y"
            echo "CONFIG_842_COMPRESS=y"
            echo "CONFIG_842_DECOMPRESS=y"
            echo "CONFIG_CRYPTO_LZ4HC=y"
            echo "CONFIG_LZ4HC_COMPRESS=y"
            echo "CONFIG_LZ4HC_DECOMPRESS=y"
            echo "CONFIG_LZ4K_COMPRESS=y"
            echo "CONFIG_LZ4K_DECOMPRESS=y"
            echo "CONFIG_LZ4KD_COMPRESS=y"
            echo "CONFIG_LZ4KD_DECOMPRESS=y"
            echo "CONFIG_CRYPTO_LZ4K=y"
            echo "CONFIG_CRYPTO_LZ4KD=y"
            echo "CONFIG_CRYPTO_LZ4K_OPLUS=y"
            echo "CONFIG_ZRAM_WRITEBACK=y"
            
            # ===== 核心网络优化 (BBR + Westwood) =====
            echo "CONFIG_TCP_CONG_ADVANCED=y"
            echo "CONFIG_TCP_CONG_BBR=y"
            echo "CONFIG_NET_SCH_FQ=y"
            echo "CONFIG_TCP_CONG_BIC=n"
            echo "CONFIG_TCP_CONG_WESTWOOD=y"
            echo "CONFIG_TCP_CONG_HTCP=n"

            # ===== 代理与路由分流 (Full IP_SET & TPROXY) =====
            echo "CONFIG_BPF_STREAM_PARSER=y"
            echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y"
            echo "CONFIG_NETFILTER_XT_SET=y"
            echo "CONFIG_IP_SET=y"
            echo "CONFIG_IP_SET_MAX=65534"
            echo "CONFIG_IP_SET_BITMAP_IP=y"
            echo "CONFIG_IP_SET_BITMAP_IPMAC=y"
            echo "CONFIG_IP_SET_BITMAP_PORT=y"
            echo "CONFIG_IP_SET_HASH_IP=y"
            echo "CONFIG_IP_SET_HASH_IPMARK=y"
            echo "CONFIG_IP_SET_HASH_IPPORT=y"
            echo "CONFIG_IP_SET_HASH_IPPORTIP=y"
            echo "CONFIG_IP_SET_HASH_IPPORTNET=y"
            echo "CONFIG_IP_SET_HASH_IPMAC=y"
            echo "CONFIG_IP_SET_HASH_MAC=y"
            echo "CONFIG_IP_SET_HASH_NETPORTNET=y"
            echo "CONFIG_IP_SET_HASH_NET=y"
            echo "CONFIG_IP_SET_HASH_NETNET=y"
            echo "CONFIG_IP_SET_HASH_NETPORT=y"
            echo "CONFIG_IP_SET_HASH_NETIFACE=y"
            echo "CONFIG_IP_SET_LIST_SET=y"
            echo "CONFIG_IP6_NF_NAT=y"
            echo "CONFIG_IP6_NF_TARGET_MASQUERADE=y"
            echo "CONFIG_NETFILTER=y"
            echo "CONFIG_NETFILTER_ADVANCED=y"
            echo "CONFIG_NETFILTER_XTABLES=y"
            echo "CONFIG_NETFILTER_XT_TARGET_TPROXY=y"
            echo "CONFIG_NETFILTER_XT_MATCH_SOCKET=y"
            echo "CONFIG_NETFILTER_XT_MATCH_MARK=y"
            echo "CONFIG_NETFILTER_XT_TARGET_MARK=y"
            echo "CONFIG_NETFILTER_XT_TARGET_REDIRECT=y"
          } >> "$DEFCONFIG"

      - name: Change Kernel Name and clean dirty
        uses: ./.github/actions/kernel-name

      - name: remove protected exports
        uses: ./.github/actions/abi-export
        
      - name: Set file name
        if: inputs.ksun == 'true'
        uses: ./.github/actions/file-name
        with:
         branch: ${{ inputs.branch }}
         android_version: ${{ inputs.android_version }}
         kernel_version: ${{ inputs.kernel_version }}

      - name: Build
        uses: ./.github/actions/build
        with:
         branch: ${{ inputs.branch }}

      - name: Self-Verification Audit & Forensic Dump
        if: always()
        run: |
          echo "======================================================="
          echo "          === 终极法医鉴定：核心特性落盘全量核验 ==="
          echo "======================================================="
          cd $GITHUB_WORKSPACE
          
          echo -e "\n[1] 查验底层 .config (宏是否成功驻留):"
          CONFIG_FILE=$(find . -name ".config" -type f | head -n 1) || true
          if [ -f "$CONFIG_FILE" ]; then
            echo "✅ 截获文件: $CONFIG_FILE"
            grep -iE "^CONFIG_ZRAM=|^CONFIG_KSU_SUSFS=|^CONFIG_CRYPTO_LZ4KD=|^CONFIG_NETFILTER_XT_TARGET_TPROXY=|^CONFIG_TCP_CONG_BBR=" "$CONFIG_FILE" || echo "❌ 严重警告：关键参数未落盘！"
          else
            echo "❌ 未发现 .config"
          fi
          
          echo -e "\n[2] 查验 zcomp.c (神级算法是否注入 UI 阵列):"
          ZCOMP_FILE=$(find . -name "zcomp.c" -type f | grep "drivers/block/zram" | head -n 1) || true
          if [ -f "$ZCOMP_FILE" ]; then
            grep -A 8 "static const char \* const backends" "$ZCOMP_FILE" || true
          else
            echo "❌ 未发现 zcomp.c"
          fi
          
          echo -e "\n[3] 查验 init.c (SUSFS 符号与挂载点火):"
          # 放宽搜索条件，精准抓取 SukiSU 的 init.c
          INIT_FILE=$(find . -name "init.c" -type f | grep "KernelSU" | head -n 1) || true
          if [ -f "$INIT_FILE" ]; then
            echo "--- extern 声明区 ---"
            head -n 20 "$INIT_FILE" | grep "susfs_init" || echo "未找到 extern 声明"
            echo "--- 点火区 ---"
            grep -A 3 "ksu_supercalls_init" "$INIT_FILE" || true
            echo "--- 缺失符号填充区 ---"
            tail -n 15 "$INIT_FILE" || true
          else
            echo "❌ 未发现 KSU init.c"
          fi
          
          echo -e "\n[4] 查验 dispatch.c (IOCTL 强行旁路):"
          DISPATCH_FILE=$(find . -name "dispatch.c" -type f | grep "supercall" | head -n 1) || true
          if [ -f "$DISPATCH_FILE" ]; then
            awk '/long ksu_supercall_handle_ioctl/,/}/' "$DISPATCH_FILE" | head -n 25 || true
          else
            echo "❌ 未发现 dispatch.c"
          fi
          echo "======================================================="
          
      - name: Prepare AnyKernel3
        uses: ./.github/actions/ak3zip-prep
        with:
         branch: ${{ inputs.branch }}

      - name: Upload AnyKernel3 Artifacts
        id: upload_ak3
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.FILE_NAME }}-AnyKernel3
          path: |
            ./AnyKernel3/**
          compression-level: 9

      - name: "📝 Extract Compiled Modules | 提取独立驱动模块"
        run: |
          echo "🌐 正在进行工作区全域扫描提取..."
          mkdir -p ./Extract-Modules
          # 使用 $GITHUB_WORKSPACE 绝对路径全盘搜索，无惧相对路径偏移
          find $GITHUB_WORKSPACE -type f -name "zram.ko" -exec cp {} ./Extract-Modules/ \; || echo "No zram.ko"
          find $GITHUB_WORKSPACE -type f -name "lz4*.ko" -exec cp {} ./Extract-Modules/ \; || echo "No lz4*.ko"

      - name: "📤 Upload Modules | 上传模块产物"
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_Modules_${{ inputs.kernel_version }}
          path: ./Extract-Modules/*

      - name: Scan and collect patch rejects
        if: ${{ always() }}
        run: |
          set -e
          CONFIG_DIR="$CONFIG"
          REJECTS_DIR="$GITHUB_WORKSPACE/patch-rejects"
          mkdir -p "$REJECTS_DIR"
          # Find all .rej files under the configuration directory
          mapfile -t REJS < <(find "$CONFIG_DIR" -type f -name '*.rej')
          REJ_COUNT=${#REJS[@]}
          echo "Found $REJ_COUNT .rej files under $CONFIG_DIR"
          echo "REJ_COUNT=$REJ_COUNT" >> $GITHUB_ENV
          if [ "$REJ_COUNT" -gt 0 ]; then
            for REJ in "${REJS[@]}"; do
              # Relative path from $CONFIG
              REL="${REJ#"$CONFIG_DIR"/}"
              DEST="$REJECTS_DIR/$REL"
              mkdir -p "$(dirname "$DEST")"
              cp "$REJ" "$DEST"
              # Copy the associated original file alongside the .rej
              ORIG="${REJ%.rej}"
              if [ -f "$ORIG" ]; then
                ORIG_DEST="$REJECTS_DIR/${REL%.rej}"
                mkdir -p "$(dirname "$ORIG_DEST")"
                cp "$ORIG" "$ORIG_DEST"
              fi
              echo "$REL" >> "$REJECTS_DIR/index.txt"
            done
          fi

      - name: Generate Build Summary
        if: ${{ always() }}
        run: |
          # Create build summary file for inclusion in Misc artifact
          echo "# Kernel Build Summary" > build_summary.md
          
          # Add build variant header
          echo "## ${{ env.FILE_NAME }}" >> build_summary.md
          
          # Add build info
          echo "## Build Information" >> build_summary.md
          echo "- **Android Version**: ${{ inputs.android_version }}" >> build_summary.md
          echo "- **Kernel Version**: ${{ inputs.kernel_version }}.${{ inputs.sub_level }}" >> build_summary.md
          echo "- **BBG**: Installed" >> build_summary.md
          echo "" >> build_summary.md

          # Get KernelSU-Next commit
          if [ -d "$CONFIG/KernelSU-Next" ]; then
            cd "$CONFIG/KernelSU-Next"
            KSUN_COMMIT=$(git rev-parse HEAD)
            KSUN_URL="https://github.com/WildKernels/KernelSU-Next/commit/$KSUN_COMMIT"
            echo "- **KernelSU-Next**: [$KSUN_COMMIT]($KSUN_URL)" >> "$GITHUB_WORKSPACE/build_summary.md"
            cd "$GITHUB_WORKSPACE"
          else
            echo "- **KernelSU-Next**: not present" >> build_summary.md
          fi
          
          # Get Baseband-guard commit
          if [ -d "$CONFIG/Baseband-guard" ]; then
            cd "$CONFIG/Baseband-guard"
            BBG_COMMIT=$(git rev-parse HEAD)
            BBG_URL="https://github.com/vc-teahouse/Baseband-guard/commit/$BBG_COMMIT"
            echo "- **Baseband-guard**: [$BBG_COMMIT]($BBG_URL)" >> "$GITHUB_WORKSPACE/build_summary.md"
            cd "$GITHUB_WORKSPACE"
          else
            echo "- **Baseband-guard**: not present" >> build_summary.md
          fi
          
          # Get SUSFS4KSU commit
          if [ -d "$GITHUB_WORKSPACE/susfs4ksu" ]; then
            cd "$GITHUB_WORKSPACE/susfs4ksu"
            SUSFS_COMMIT=$(git rev-parse HEAD)
            SUSFS_URL="https://gitlab.com/simonpunk/susfs4ksu/-/commit/$SUSFS_COMMIT"
            echo "- **SUSFS4KSU (v2.1.0)**: [$SUSFS_COMMIT]($SUSFS_URL)" >> "$GITHUB_WORKSPACE/build_summary.md"
            cd "$GITHUB_WORKSPACE"
          else
            echo "- **SUSFS4KSU (v2.1.0)**: not present" >> build_summary.md
          fi
          echo "" >> build_summary.md
          
          # Add artifact summary with presence verification
          echo "## Build Artifacts" >> build_summary.md

          # Verify AnyKernel3 contents - check if kernel Image was actually copied (indicates successful build)
          if [ -d "AnyKernel3" ] && [ -f "AnyKernel3/Image" ]; then
            AK3_STATUS="✅"
          else
            AK3_STATUS="❌"
          fi
          echo "- **AnyKernel3**: $AK3_STATUS ${{ env.FILE_NAME }}-AnyKernel3" >> build_summary.md

          echo "### Misc (uploaded files)" >> build_summary.md
          FILES_PRESENT=0
          for f in "${{ env.FILE_NAME }}-Image" "${{ env.FILE_NAME }}-Image.gz" "${{ env.FILE_NAME }}-Image.lz4" "${{ env.FILE_NAME }}-boot.img" "${{ env.FILE_NAME }}-boot-gz.img" "${{ env.FILE_NAME }}-boot-lz4.img"; do
            if [ -f "$f" ]; then FILES_PRESENT=$((FILES_PRESENT+1)); fi
          done
          if [ "$FILES_PRESENT" -gt 0 ]; then
            MISC_STATUS="✅"
          else
            MISC_STATUS="❌"
          fi
          echo "- **Set**: $MISC_STATUS ${{ env.FILE_NAME }}-Misc" >> build_summary.md
          if [ "$MISC_STATUS" = "✅" ]; then
            echo "  Included:" >> build_summary.md
            for f in "${{ env.FILE_NAME }}-Image" "${{ env.FILE_NAME }}-Image.gz" "${{ env.FILE_NAME }}-Image.lz4" "${{ env.FILE_NAME }}-boot.img" "${{ env.FILE_NAME }}-boot-gz.img" "${{ env.FILE_NAME }}-boot-lz4.img"; do
              if [ -f "$f" ]; then
                echo "  - $f" >> build_summary.md
              fi
            done
          fi

          echo "### Diagnostics" >> build_summary.md
          echo "- **Rejected Patches**: ${{ env.FILE_NAME }}-Rejected-Patches" >> build_summary.md
          if [ -f patch-rejects/index.txt ]; then
            if [ -s patch-rejects/index.txt ]; then
              echo "  Rejected files:" >> build_summary.md
              while IFS= read -r line; do
                echo "    - $line" >> build_summary.md
              done < patch-rejects/index.txt
            else
              echo "  Rejected file list is empty." >> build_summary.md
            fi
          else
            echo "  No rejected patches found." >> build_summary.md
          fi
